name: Actualizar feed de Instagram

on:
  schedule:
    - cron: '0 7 * * *'      # todos los días a las 07:00 UTC
  workflow_dispatch:          # botón para correrlo a mano cuando quieras

permissions:
  contents: write             # para poder commitear el JSON y las imágenes

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bajar los últimos posts
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: node scripts/fetch-instagram.js

      - name: Refrescar token (opcional, si configuraste GH_PAT)
        if: env.GH_PAT != ''
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: node scripts/refresh-token.js

      - name: Commitear cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/instagram.json assets/ig
          git diff --staged --quiet || git commit -m "Actualizar feed de Instagram"
          git push
